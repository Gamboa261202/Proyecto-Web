<!DOCTYPE html>
<html lang="es">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/style.css">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - Sistema de Gestión de Egresados</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <h1>Sistema de Gestión de Egresados</h1>
        <p class="subtitulo">Universidad CENFOTEC</p>
        <nav aria-label="Navegación principal">
            <a href="index.html">Inicio</a>
            <a href="login.html">Inicio de sesión</a>
            <a href="perfil.html">Perfil</a>
            <a href="egresados.html">Egresados</a>
            <a href="carreras.html">Carreras</a>
        </nav>
    </header>

    <main>
        <section class="contenedor-formulario">
            <h2>Iniciar Sesión</h2>
            
        
            <form id="formLogin" novalidate>
                
                <div class="grupo-formulario">
                    <label for="correo">Correo Electrónico:</label>
                    <input type="email" id="correo" name="correo" placeholder="ejemplo@ucenfotec.ac.cr">
                    <span class="error-mensaje" id="errorCorreo"></span>
                </div>

                <div class="grupo-formulario">
                    <label for="contrasena">Contraseña:</label>
                    <input type="password" id="contrasena" name="contrasena" placeholder="Ingrese su contraseña">
                    <!-- Espacio para mostrar el error si la validación falla -->
                    <span class="error-mensaje" id="errorContrasena"></span>
                </div>

                <button type="submit">Ingresar</button>
                
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 Universidad CENFOTEC</p>
    </footer>

    <script src="js/login.js"></script>
</body>

</html>
